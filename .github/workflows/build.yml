name: Build Android APK

# This triggers the build on pushes to the main branch or manually
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        # Matching the specific Cython version required in your spec file
        pip install Cython==0.29.33 
        pip install buildozer

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true

    - name: Build APK with Buildozer
      run: |
        # This command reads your buildozer.spec and compiles the code
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ultrasonic-demonstrator-apk
        path: bin/*.apk
