name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Fixes the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.9'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        # Upgrade Cython to 3.0+ to ensure compatibility with modern Python
        pip install "Cython>=0.29.33" 
        pip install buildozer

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true

    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ultrasonic-demonstrator-apk
        path: bin/*.apk
